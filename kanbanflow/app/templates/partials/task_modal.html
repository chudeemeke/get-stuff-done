<!-- Task edit modal -->
<form hx-put="/tasks/{{ task.id }}" hx-target="#task-{{ task.id }}" hx-swap="outerHTML"
  hx-on::after-request="closeModal()">
  <div class="p-6">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-lg font-bold">Edit Task</h2>
      <button type="button" onclick="closeModal()"
        class="p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Title</label>
        <input type="text" name="title" value="{{ task.title }}" required
          class="w-full px-3 py-2 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Description</label>
        <textarea name="description" rows="3"
          class="w-full px-3 py-2 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 outline-none focus:ring-2 focus:ring-indigo-500 resize-none">{{ task.description }}</textarea>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Priority</label>
          <select name="priority"
            class="w-full px-3 py-2 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="low" {% if task.priority == 'low' %}selected{% endif %}>Low</option>
            <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>Medium</option>
            <option value="high" {% if task.priority == 'high' %}selected{% endif %}>High</option>
            <option value="urgent" {% if task.priority == 'urgent' %}selected{% endif %}>Urgent</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Label</label>
          <select name="label"
            class="w-full px-3 py-2 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="" {% if not task.label %}selected{% endif %}>No label</option>
            <option value="feature" {% if task.label == 'feature' %}selected{% endif %}>Feature</option>
            <option value="bug" {% if task.label == 'bug' %}selected{% endif %}>Bug</option>
            <option value="chore" {% if task.label == 'chore' %}selected{% endif %}>Chore</option>
            <option value="docs" {% if task.label == 'docs' %}selected{% endif %}>Docs</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">Due Date</label>
        <input type="date" name="due_date" value="{{ task.due_date or '' }}"
          class="w-full px-3 py-2 rounded-xl border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 outline-none focus:ring-2 focus:ring-indigo-500" />
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button type="submit"
        class="flex-1 px-4 py-2.5 font-medium bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white rounded-xl shadow-lg shadow-indigo-500/25 transition-all active:scale-95">
        Save Changes
      </button>
      <button type="button" onclick="closeModal()"
        class="px-4 py-2.5 font-medium rounded-xl border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        Cancel
      </button>
    </div>
  </div>
</form>
