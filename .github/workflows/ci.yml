name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        run: bash scripts/lint-workflows.sh

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          # Full history is required so gitleaks scans every commit, not just HEAD.
          fetch-depth: 0
      - name: Run gitleaks scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_SUMMARY: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  audit-ci:
    name: Audit CI (blocking HIGH/CRITICAL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: npm install --package-lock-only --ignore-scripts
      - run: bun run audit:ci

  docs-gates:
    name: Docs Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run lint:docs
      - name: Collect tracked markdown link targets
        shell: bash
        run: |
          git -c core.quotePath=false ls-files "*.md" |
            grep -Ev '^(node_modules/|dist/|\.upstream/|overlay/get-shit-done/)' > .lychee-targets
          test -s .lychee-targets
      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --files-from .lychee-targets --no-progress --verbose
          fail: "true"
          failIfEmpty: "true"

  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      # Direct action usage is intentional. OSV's reusable workflow is the
      # general recommendation, but this job needs same-job harden-runner
      # telemetry plus local medium/low triage.
      - name: Run OSV scanner against bun.lock
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            scan
            source
            --lockfile=bun.lock
            --format=json
            --output-file=osv-results.json
      - name: Triage OSV findings
        run: node scripts/osv-triage.js --input osv-results.json --output osv-triage.json --fail-on high,critical
      - name: Upload OSV triage artifacts
        if: ${{ always() && hashFiles('osv-triage.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: osv-triage
          path: |
            osv-results.json
            osv-triage.json
          retention-days: 30
      - name: Upsert medium and low OSV issues
        if: ${{ always() && hashFiles('osv-triage.json') != '' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const findings = JSON.parse(fs.readFileSync('osv-triage.json', 'utf8'))
              .filter(finding => ['medium', 'low'].includes(finding.severity));

            if (findings.length === 0) {
              core.info('No medium or low OSV findings to route.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelColors = {
              security: 'd73a4a',
              'security-moderate': 'fbca04',
              'security-low': '0e8a16',
              osv: '5319e7',
              dependency: '0366d6',
            };

            for (const label of new Set(findings.flatMap(finding => finding.labels))) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: labelColors[label] || 'ededed',
                });
              }
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'osv',
              per_page: 100,
            });

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            for (const finding of findings) {
              const existing = openIssues.find(issue => !issue.pull_request && issue.title === finding.title);
              if (existing) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body: `Observed again in ${runUrl}.`,
                });
              } else {
                await github.rest.issues.create({
                  owner,
                  repo,
                  title: finding.title,
                  body: `${finding.body}\n\nFirst observed in ${runUrl}.`,
                  labels: finding.labels,
                });
              }
            }

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - run: bun run lint

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    env:
      BUN_TEST_TIMEOUT: 30000
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - name: Guard against test files in dist/
        run: node scripts/check-no-test-files-in-dist.js
      - name: Run tests with coverage and JUnit output
        run: bun test --coverage --reporter=junit --reporter-outfile test-results.xml
      - name: Upload test results on failure
        if: ${{ failure() && hashFiles('test-results.xml') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: test-results.xml
          retention-days: 14
      - name: Build Windows flake events
        if: ${{ failure() && matrix.os == 'windows-latest' && hashFiles('test-results.xml') != '' }}
        run: >-
          node scripts/flake-triage.js
          --junit test-results.xml
          --platform windows
          --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          --commit "${{ github.sha }}"
          --output flake-events.json
      - name: Upsert Windows flake issues
        if: ${{ failure() && matrix.os == 'windows-latest' && hashFiles('flake-events.json') != '' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const events = JSON.parse(fs.readFileSync('flake-events.json', 'utf8'));
            if (events.length === 0) {
              core.info('No JUnit failure events found for flake triage.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const bunVersion = execSync('bun --version', { encoding: 'utf8' }).trim();
            const nodeVersion = process.version;
            const labelColors = {
              'flake-report': 'd876e3',
              'flake-platform-windows': '0078d4',
              'rel-03-candidate': 'fbca04',
            };

            async function ensureLabel(label) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: labelColors[label] || 'ededed',
                });
              }
            }

            async function recentHitCount(issueNumber) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              });
              const cutoff = Date.now() - (14 * 24 * 60 * 60 * 1000);
              return comments.filter(comment =>
                comment.created_at &&
                Date.parse(comment.created_at) >= cutoff &&
                comment.body.includes('Observed in')
              ).length + 1;
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'flake-report',
              per_page: 100,
            });

            for (const event of events) {
              const existing = openIssues.find(issue => !issue.pull_request && issue.title === event.title);
              const labels = new Set(event.labels);
              if (existing && await recentHitCount(existing.number) >= 3) {
                labels.add('rel-03-candidate');
              }

              for (const label of labels) {
                await ensureLabel(label);
              }

              const body = [
                `Observed in ${event.runUrl}.`,
                `Commit: ${event.commit}`,
                `Bun: ${bunVersion}`,
                `Node: ${nodeVersion}`,
                `Failure: ${event.failureMessage || '(no failure message)'}`,
              ].join('\n');

              if (existing) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existing.number,
                  body,
                });
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: existing.number,
                  labels: [...labels],
                });
              } else {
                await github.rest.issues.create({
                  owner,
                  repo,
                  title: event.title,
                  body: `${body}\n\nDedup key: ${event.key}`,
                  labels: [...labels],
                });
              }
            }
      - name: Append Windows Active REL-03 skips summary
        if: ${{ always() && matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          node scripts/flake-triage.js --scan-rel03 --output-summary rel03-summary.md
          {
            cat rel03-summary.md
            echo ""
            echo "Interim flake collector scope cap: more than 5 flaky files/week requires Tailscale collector planning."
          } >> "$GITHUB_STEP_SUMMARY"
          node scripts/flake-triage.js --validate-rel03-wrappers

  perf-budget:
    name: Perf Budget (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-15
            platform: macos
          - os: windows-latest
            platform: windows
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - name: Install hyperfine (Linux)
        if: ${{ matrix.platform == 'linux' }}
        run: |
          if ! command -v hyperfine >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y hyperfine
          fi
      - name: Install hyperfine (macOS)
        if: ${{ matrix.platform == 'macos' }}
        run: |
          if ! command -v hyperfine >/dev/null 2>&1; then
            brew install hyperfine
          fi
      - name: Install hyperfine (Windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: powershell
        run: |
          if (-not (Get-Command hyperfine -ErrorAction SilentlyContinue)) {
            choco install hyperfine -y --no-progress
          }
      - name: Capture current install and compose metrics
        run: node scripts/bench.js --platform ${{ matrix.platform }} --runs 3 --warmup 1 --out perf-current.json
      - name: Enforce perf budget
        run: node scripts/check-perf.js --baseline perf-baseline.json --current perf-current.json --platform ${{ matrix.platform }} --warn-ratio 1.10 --fail-ratio 1.25

  parity:
    name: Source Parity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - run: node scripts/check-parity.js

  upstream-compat:
    name: Upstream Compat (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Informational: branding-caused upstream test differences are expected.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - run: node scripts/run-upstream-compat-ci.js

  boundary-check:
    name: Boundary Check (informational)
    runs-on: ubuntu-latest
    # Known structural root-mirror debt remains informational. The ratchet gate
    # is blocking so existing debt cannot increase silently.
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - name: Check boundary violations
        # Report-only: 41 structural boundary violations are expected in the
        # overlay architecture per AF-7. The following ratchet step remains
        # blocking so the known debt cannot increase silently.
        run: node scripts/check-boundary.js --report-only
      - name: Ratchet gate (debt-baseline.json)
        run: node scripts/check-debt-ratchet.cjs --no-compose

  override-check:
    name: Override Staleness Check (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - name: Check override staleness
        run: node scripts/check-overrides.js
