<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <!-- Dark background with subtle terminal grid pattern -->
  <rect width="1200" height="400" fill="#1a1b26"/>

  <!-- Terminal grid pattern (subtle) -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#2a2b36" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="400" fill="url(#grid)" opacity="0.3"/>

  <!-- Main lockup (centered) -->
  <g transform="translate(200, 50)">
    <!-- Icon (interlocking squares) -->
    <g transform="scale(0.6)">
      <!-- Front Square (Cyan) -->
      <g transform="rotate(30 200 200)">
        <rect x="120" y="120" width="160" height="160" fill="none" stroke="#5FD7D7" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Front faces (lighter) -->
        <rect x="130" y="130" width="140" height="20" fill="#5FD7D7" opacity="0.3"/>
        <rect x="130" y="130" width="20" height="140" fill="#5FD7D7" opacity="0.3"/>
      </g>

      <!-- Back Square (Green) -->
      <g transform="rotate(30 200 200)">
        <rect x="180" y="180" width="160" height="160" fill="none" stroke="#87D787" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Back faces (darker) -->
        <rect x="310" y="190" width="20" height="140" fill="#87D787" opacity="0.2"/>
        <rect x="190" y="310" width="140" height="20" fill="#87D787" opacity="0.2"/>
      </g>
    </g>

    <!-- Text: Get•Stuff•Done (scaled up) -->
    <g transform="translate(350, 85) scale(1.8)">
      <!-- Get -->
      <path fill="url(#textGradient)" d="M0,0 h30 v10 h-20 v15 h15 v10 h-15 v15 h20 v10 h-30 z M40,0 h30 v10 h-20 v40 h20 v10 h-30 z M80,0 h10 v50 h20 v10 h-30 z"/>

      <!-- Bullet 1 -->
      <circle cx="130" cy="25" r="4" fill="#FFFFFF"/>

      <!-- Stuff -->
      <path fill="url(#textGradient)" d="M150,10 h20 v10 h-10 v10 h10 v10 h-10 v10 h10 v10 h-20 v-10 h10 v-10 h-10 v-10 h10 v-10 h-10 z M180,0 h10 v60 h-10 z M200,10 h20 v40 h10 v10 h-30 z M240,10 h30 v10 h-20 v10 h15 v10 h-15 v20 h-10 z M280,10 h30 v10 h-20 v10 h15 v10 h-15 v20 h-10 z"/>

      <!-- Bullet 2 -->
      <circle cx="330" cy="25" r="4" fill="#FFFFFF"/>

      <!-- Done -->
      <path fill="url(#textGradient)" d="M350,0 h20 v50 h10 v10 h-30 v-10 h10 v-40 h-10 z M390,0 h20 v50 h10 v10 h-30 v-10 h10 v-40 h-10 z M430,0 h30 v10 h-20 v15 h20 v10 h-20 v15 h20 v10 h-30 z"/>
    </g>
  </g>

  <!-- Subtle tagline -->
  <text x="600" y="330" font-family="monospace" font-size="16" fill="#6a7088" text-anchor="middle">
    Meta-prompting and spec-driven development for Claude Code
  </text>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5FD7D7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#87D787;stop-opacity:1"/>
    </linearGradient>
  </defs>
</svg>
