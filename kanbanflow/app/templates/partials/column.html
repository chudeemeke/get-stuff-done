<!-- Single Kanban column -->
<div class="flex-shrink-0 w-[300px] sm:w-[320px] snap-center flex flex-col bg-gray-50/80 dark:bg-gray-900/60 rounded-2xl border border-gray-200/60 dark:border-gray-800/60 max-h-full backdrop-blur-sm"
     id="column-{{ col.id }}">

  <!-- Column header -->
  <div class="flex items-center justify-between p-3.5 border-b border-gray-200/60 dark:border-gray-800/60">
    <div class="flex items-center gap-2.5">
      <div class="w-2.5 h-2.5 rounded-full ring-2 ring-offset-1 ring-offset-gray-50 dark:ring-offset-gray-900" style="background-color: {{ col.color }}; box-shadow: 0 0 8px {{ col.color }}40;"></div>
      <h3 class="font-semibold text-[13px] text-gray-700 dark:text-gray-200 tracking-tight">{{ col.title }}</h3>
      <span class="task-count text-[11px] font-semibold px-2 py-0.5 rounded-full bg-gray-200/80 dark:bg-gray-800 text-gray-500 dark:text-gray-400 tabular-nums">
        {{ col.tasks | length }}
      </span>
    </div>
    <div class="flex items-center gap-0.5">
      <button onclick="toggleTaskForm({{ col.id }})"
        class="p-1.5 rounded-lg hover:bg-white dark:hover:bg-gray-800 transition-colors text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400"
        title="Add task">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
        </svg>
      </button>
      <button hx-delete="/columns/{{ col.id }}" hx-target="#column-{{ col.id }}" hx-swap="outerHTML"
        hx-confirm="Delete this column and all its tasks?"
        class="p-1.5 rounded-lg hover:bg-red-50 dark:hover:bg-red-500/10 text-gray-400 hover:text-red-500 transition-colors"
        title="Delete column">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Add task form (hidden) -->
  <form id="task-form-{{ col.id }}" class="hidden p-3 border-b border-gray-200/60 dark:border-gray-800/60 bg-white/50 dark:bg-gray-800/30"
    hx-post="/tasks/" hx-target="#tasklist-{{ col.id }}" hx-swap="beforeend"
    hx-on::after-request="this.reset()">
    <input type="hidden" name="column_id" value="{{ col.id }}" />
    <input type="text" name="title" placeholder="Task title..." required
      class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 outline-none focus:ring-2 focus:ring-indigo-500/40 mb-2" />
    <textarea name="description" placeholder="Description (optional)" rows="2"
      class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 outline-none focus:ring-2 focus:ring-indigo-500/40 mb-2 resize-none"></textarea>
    <div class="flex gap-2 mb-2">
      <select name="priority"
        class="flex-1 px-2 py-1.5 text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 outline-none">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
        <option value="urgent">Urgent</option>
      </select>
      <select name="label"
        class="flex-1 px-2 py-1.5 text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 outline-none">
        <option value="">No label</option>
        <option value="feature">Feature</option>
        <option value="bug">Bug</option>
        <option value="chore">Chore</option>
        <option value="docs">Docs</option>
      </select>
    </div>
    <input type="date" name="due_date"
      class="w-full px-3 py-1.5 text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 outline-none mb-2" />
    <div class="flex gap-2">
      <button type="submit"
        class="flex-1 px-3 py-2 text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition-colors active:scale-[0.98]">
        Add Task
      </button>
      <button type="button" onclick="toggleTaskForm({{ col.id }})"
        class="px-3 py-2 text-sm rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        Cancel
      </button>
    </div>
  </form>

  <!-- Task list (sortable) -->
  <div id="tasklist-{{ col.id }}" class="task-list flex-1 overflow-y-auto p-2 space-y-2 min-h-[60px]"
       data-column-id="{{ col.id }}">
    {% for task in col.tasks %}
    {% include "partials/task_card.html" %}
    {% endfor %}
  </div>
</div>
