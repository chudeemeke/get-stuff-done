<div class="flex items-center gap-2.5 group py-1.5 px-1 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors" id="subtask-{{ subtask.id }}">
  <button hx-post="/subtasks/{{ subtask.id }}/toggle" hx-target="#subtask-{{ subtask.id }}" hx-swap="outerHTML"
    class="flex-shrink-0 w-[18px] h-[18px] rounded-[5px] border-2 {{ 'bg-emerald-500 border-emerald-500' if subtask.completed else 'border-gray-300 dark:border-gray-600 hover:border-indigo-400' }} flex items-center justify-center transition-all cursor-pointer">
    {% if subtask.completed %}
    <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
    </svg>
    {% endif %}
  </button>
  <span class="flex-1 text-[13px] {{ 'line-through text-gray-400 dark:text-gray-500' if subtask.completed else 'text-gray-700 dark:text-gray-200' }} transition-colors">
    {{ subtask.title }}
  </span>
  <button hx-delete="/subtasks/{{ subtask.id }}" hx-target="#subtask-{{ subtask.id }}" hx-swap="outerHTML"
    class="flex-shrink-0 p-1 rounded-md opacity-0 group-hover:opacity-100 hover:bg-red-50 dark:hover:bg-red-500/10 text-gray-400 hover:text-red-500 transition-all"
    title="Remove">
    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
</div>
