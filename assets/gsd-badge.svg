<svg xmlns="http://www.w3.org/2000/svg" width="90" height="20">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="badgeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5FD7D7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#87D787;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="90" height="20" fill="url(#badgeGradient)" rx="3"/>

  <!-- Icon (simplified interlocking squares) -->
  <g transform="translate(4, 4) scale(0.025)">
    <!-- Front Square (Cyan) -->
    <g transform="rotate(30 200 200)">
      <rect x="120" y="120" width="160" height="160" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Back Square (Green - offset) -->
    <g transform="rotate(30 200 200)">
      <rect x="180" y="180" width="160" height="160" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Text: GSD -->
  <text x="20" y="14" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#1a1b26">GSD</text>
</svg>
