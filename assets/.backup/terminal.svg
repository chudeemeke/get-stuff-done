<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <style>
      .terminal-bg { fill: #1a1b26; }
      .terminal-border { fill: #24283b; }
      .title-bar { fill: #1f2335; }
      .btn-red { fill: #f7768e; }
      .btn-yellow { fill: #e0af68; }
      .btn-green { fill: #9ece6a; }
      .text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace; }
      .prompt { fill: #7aa2f7; }
      .command { fill: #c0caf5; }
      .cyan { fill: #5FD7D7; }
      .green { fill: #87D787; }
      .dim { fill: #565f89; }
      .white { fill: #c0caf5; }
      .yellow { fill: #e0af68; }
    </style>
  </defs>

  <!-- Window -->
  <rect class="terminal-border" width="960" height="540" rx="12"/>
  <rect class="terminal-bg" x="1" y="1" width="958" height="538" rx="11"/>

  <!-- Title bar -->
  <rect class="title-bar" x="1" y="1" width="958" height="36" rx="11"/>
  <rect class="terminal-bg" x="1" y="26" width="958" height="12"/>

  <!-- Window buttons -->
  <circle class="btn-red" cx="24" cy="19" r="7"/>
  <circle class="btn-yellow" cx="48" cy="19" r="7"/>
  <circle class="btn-green" cx="72" cy="19" r="7"/>

  <!-- Title -->
  <text x="480" y="24" text-anchor="middle" class="text dim" font-size="13">Destiny@Destiny:~</text>

  <!-- Content -->
  <g transform="translate(32, 72)">
    <!-- Prompt line -->
    <text class="text prompt" font-size="15" y="0">~</text>
    <text class="text dim" font-size="15" x="16" y="0">$</text>
    <text class="text command" font-size="15" x="36" y="0">bunx get-stuff-done</text>

    <!-- Compact isometric icon banner (stylized) -->
    <text class="text cyan" font-size="14" y="40" xml:space="preserve">  </text>
    <text class="text cyan" font-size="14" y="48" xml:space="preserve">    ___  ___  ___</text>
    <text class="text cyan" font-size="14" y="63" xml:space="preserve">   /   \/   \/   \</text>
    <text class="text green" font-size="14" y="78" xml:space="preserve">   \___/\___/\___/   </text>
    <text class="text green" font-size="14" y="93" xml:space="preserve">   /   \/   \/   \</text>
    <text class="text cyan" font-size="14" y="108" xml:space="preserve">   \___/\___/\___/</text>

    <!-- Icon representation with [GSD] -->
    <text class="text" font-size="18" font-weight="bold" y="145"><tspan class="cyan">[GSD]</tspan><tspan class="green"> GetStuffDone</tspan></text>

    <!-- Title and subtitle -->
    <text class="text white" font-size="15" y="180">  Get Stuff Done <tspan class="dim">v2.0.0</tspan></text>
    <text class="text white" font-size="15" y="204">  A meta-prompting, context engineering and spec-driven</text>
    <text class="text white" font-size="15" y="224">  development system for Claude Code <tspan class="cyan">by AI Dev Environment</tspan>.</text>

    <!-- Install output -->
    <text class="text" font-size="15" y="268"><tspan class="green">  [check]</tspan><tspan class="white"> Installed commands/gsd</tspan></text>
    <text class="text" font-size="15" y="292"><tspan class="green">  [check]</tspan><tspan class="white"> Installed get-stuff-done</tspan></text>
    <text class="text" font-size="15" y="316"><tspan class="green">  [check]</tspan><tspan class="white"> Configured Claude Code integration</tspan></text>

    <!-- Done message -->
    <text class="text" font-size="15" y="356"><tspan class="green">  Done!</tspan><tspan class="white"> Run </tspan><tspan class="cyan">/gsd:help</tspan><tspan class="white"> to get started.</tspan></text>

    <!-- Decorative dots -->
    <g transform="translate(24, 385)">
      <circle fill="#5FD7D7" cx="0" cy="0" r="4"/>
      <circle fill="#87D787" cx="16" cy="0" r="4"/>
      <circle fill="#5FD7D7" cx="32" cy="0" r="4"/>
      <circle fill="#87D787" cx="48" cy="0" r="4"/>
      <circle fill="#5FD7D7" cx="64" cy="0" r="4"/>
    </g>

    <!-- New prompt -->
    <text class="text prompt" font-size="15" y="420">~</text>
    <text class="text dim" font-size="15" x="16" y="420">$</text>
    <text class="text white" font-size="15" x="36" y="420">|</text>
  </g>
</svg>
