name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        run: bash scripts/lint-workflows.sh

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    # BLOCKING. Detects leaked credentials before they reach main.
    # Composes with: .gitignore proactive patterns (catches common-named
    # files at staging time), GitHub-native secret scanning + push
    # protection (server-side, partner patterns), and the pending aidev
    # quality-gate Secrets gate (filed at
    # ~/Projects/ai-dev-environment/docs/inbox/2026-05-05-get-stuff-done-quality-gate-skill-missing-secrets-gate.md
    # — when shipped, this step may delegate or be removed). See A-11.
    #
    # Uses direct gitleaks binary install rather than gitleaks-action to
    # avoid GITLEAKS_LICENSE requirement for organization repos. Pinned
    # to a specific release version for reproducibility; bump as needed.
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history needed so gitleaks scans every commit, not just HEAD.
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks scan
        run: |
          # detect = scan working tree + full history. --no-banner for clean
          # logs, --redact so any finding's value is masked in CI output,
          # --report-path so artifact upload has the structured findings.
          gitleaks detect \
            --source . \
            --no-banner \
            --redact \
            --report-format json \
            --report-path gitleaks-report.json \
            --exit-code 1
      - name: Upload gitleaks report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - run: bun run lint

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    env:
      BUN_TEST_TIMEOUT: 30000
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - name: Guard against test files in dist/
        run: node scripts/check-no-test-files-in-dist.js
      - run: bun test --coverage

  parity:
    name: Source Parity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - run: node scripts/check-parity.js

  upstream-compat:
    name: Upstream Compat (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Informational -- ~130 branding-caused test differences expected
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - run: node scripts/run-upstream-compat.js

  boundary-override-check:
    name: Boundary & Override Check
    runs-on: ubuntu-latest
    # Job is blocking at the WORKFLOW level. Individual informational steps
    # (boundary, overrides) carry continue-on-error: true so they surface
    # status without failing the workflow. The Ratchet gate step is BLOCKING
    # by default and gates merge per Wave 1.6 Task 1.6-04.
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run compose
      - name: Check boundary violations
        run: node scripts/check-boundary.js
        # Informational -- 48 structural boundary violations expected in overlay
        # architecture per AF-7. The ratchet step below enforces no-increase.
        continue-on-error: true
      - name: Check override staleness
        run: node scripts/check-overrides.js
        # Informational -- staleness signal until Wave 5 of Phase 40.5 rebases
        # override REASON.md SHAs against current upstream pin.
        continue-on-error: true
      - name: Ratchet gate (debt-baseline.json)
        run: node scripts/check-debt-ratchet.cjs --no-compose
        # BLOCKING. Reads .planning/audits/debt-baseline.json and rejects any
        # increase over the per-OS thresholds. Threshold updates are conscious
        # decisions captured in ratchet_history. See Phase 40.5 Wave 1.6
        # Task 1.6-04 + Wave 1.5d.
