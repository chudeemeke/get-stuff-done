<div class="group py-3 border-b border-gray-100 dark:border-gray-800/50 last:border-0" id="comment-{{ comment.id }}">
  <div class="flex items-start justify-between gap-3">
    <div class="flex-1 min-w-0">
      <p class="text-[13px] text-gray-700 dark:text-gray-200 leading-relaxed whitespace-pre-wrap break-words">{{ comment.text }}</p>
      <p class="text-[11px] text-gray-400 dark:text-gray-500 mt-1">{{ comment.created_at.strftime('%b %d at %I:%M %p') }}</p>
    </div>
    <button hx-delete="/comments/{{ comment.id }}" hx-target="#comment-{{ comment.id }}" hx-swap="outerHTML"
      class="flex-shrink-0 p-1 rounded-md opacity-0 group-hover:opacity-100 hover:bg-red-50 dark:hover:bg-red-500/10 text-gray-400 hover:text-red-500 transition-all mt-0.5"
      title="Delete">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
</div>
