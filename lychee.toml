# CI writes `.lychee-targets` from `git ls-files "*.md"` after applying the same
# generated/dependency exclusions used by scripts/lint-docs.js, then passes it
# with `lychee --files-from .lychee-targets`.
# Exclusion contract: dependency/vendor/generated markdown only.

exclude_path = [
  "^node_modules/",
  "^dist/",
  "^\\.upstream/",
  "^overlay/get-shit-done/",
]

exclude = [
  # Localhost URLs in command templates are examples, not public documentation links.
  "^http://localhost(:[0-9]+)?(/|$)",
]

accept = [
  "100..=103",
  "200..=299",
  "403",
  "429",
]

max_retries = 2
retry_wait_time = 2
timeout = 20
